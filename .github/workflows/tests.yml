# =============================================================================
# Assistant OS - CI/CD Pipeline
# =============================================================================
# Runs tests on push and pull requests to main branch.
# Python 3.11, unittest discover.
# =============================================================================

name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master, reconcile/baseline-freeze ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      # Test environment variables (not real secrets)
      NOTION_TOKEN: "test_notion_token_not_real"
      NOTION_WORK_DB_ID: "test_db_id_not_real"
      WEBHOOK_TOKEN: "test_webhook_token_not_real"
      SHEETS_SPREADSHEET_ID: "test_spreadsheet_id_not_real"
      # Force UTF-8 everywhere — prevents charmap errors on Windows runners
      # and makes cross-platform behavior consistent (Python 3.7+ standard fix).
      PYTHONUTF8: "1"
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v
